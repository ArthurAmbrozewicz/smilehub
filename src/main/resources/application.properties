spring.application.name=smilehub
# porta padrão 
server.port=8080
server.tomcat.uri-encoding=UTF-8

server.servlet.context-path=/smilehub

# URL de conexão
spring.datasource.url=jdbc:mysql://localhost:3306/smilehub?useSSL=false&serverTimezone=UTC

# Credenciais
spring.datasource.username=root
spring.datasource.password=master100

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Em dev use update para não apagar o schema ao reiniciar (create-drop derruba tabelas no shutdown).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Executa data.sql após o Hibernate criar/atualizar o schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# JWT
jwt.secret=SmileHubSecretKeyParaAssinaturaJwtComNoMinimo32Bytes
jwt.expiration-ms=86400000

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB